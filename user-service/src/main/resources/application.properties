spring.application.name=user-service
spring.threads.virtual.enabled=true
server.servlet.context-path=/
server.error.include-stacktrace=on_param
server.tomcat.threads.max=20
spring.config.import=optional:classpath:.env[.properties]
spring.datasource.url=jdbc:mysql://localhost:3306/user_service?useTimezone=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${ENV_ROOT_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
logging.level.dev.rafa.userservice=debug
logging.level.net.ttddyy.dsproxy.listener=debug
logging.level.org.springframework.security=debug
brasil-api.base-url=${BRASIL_API_BASE_URL:https://brasilapi.com.br/api}
brasil-api.cep-uri=${BRASIL_API_CEP_URI:/cep/v1/{cep}}
